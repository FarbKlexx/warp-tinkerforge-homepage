<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WARP by Tinkerforge</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

  <link href="./assets/css/output.css" rel="stylesheet">
  
</head>

  <body class="min-h-screen overflow-x-hidden relative bg-background">

    <!-- Navigation -->
    <header class="fixed top-6 left-0 w-full z-50 flex justify-center">
        <nav class="relative overflow-hidden w-full max-w-6xl flex items-center justify-between px-2 py-2 rounded-[10px] border border-grey/50 shadow-xl"> 
            <!-- Black Tint Overlay, needed for Liquid Glass -->
            <div class="absolute inset-0 bg-black/30 pointer-events-none z-0"></div>

            <!-- Left Sided Content (Logo) -->
            <div class="ml-1 relative z-10 flex items-center">
                <img 
                    src="./assets/images/warp-logo.svg" 
                    alt="WARP Charger Logo" 
                    class="h-8 w-auto" 
                >
            </div>

            <!-- Right Sided Content -->
            <div class="z-10 flex flex-row gap-8 items-center">

                <!-- Navi-Items -->
                <ul class="relative z-10 hidden md:hidden lg:flex gap-8 text-white">
                    <li class="nav-item">Produkte</li>
                    <li class="nav-item">Software</li>
                    <li class="nav-item">Lösungen</li>
                    <li class="nav-item">Über uns</li>
                    <li class="nav-item flex items-center gap-1 cursor-pointer">
                        Dokumentation
                        <span class="material-symbols-outlined text-[18px]!">open_in_new</span>
                    </li>

                </ul>

                <!-- Buttons -->
                <div class="z-10 flex flex-row gap-2 items-center">
                    <button
                        type="button"
                        class="btn-tertiary">
                        Downloads
                    </button>

                    <button
                        type="button"
                        class="btn-secondary">
                        Shop
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="flex flex-col items-center text-center">

        <!-- Hero Section -->
        <section class="relative w-full overflow-hidden flex flex-col items-center pt-32 pb-0 min-h-140 md:min-h-175 lg:min-h-225 bg-gradient-light-white-background">
          <div class="relative flex flex-col items-center gap-4 md:gap-8 lg:gap-8  w-full">

              <!-- Display Text -->
              <div class="flex flex-col items-center gap-0">
                <!-- Display 2 -->
                <p
                    class="text-display-2 bg-gradient-blue bg-clip-text text-transparent"
                >
                    <span class="italic text-display-2">Open Source</span> Ladelösungen.
                </p>

                <!-- Display 1 -->
                <div class="flex items-end gap-0 mt-1">
                    <div class="flex items-start">
                            <span class="text-display-1 font-black bg-gradient-dark-soft bg-clip-text text-transparent leading-[1.3] pr-2 -mr-2">
                                WARP
                            </span>
                            <sup class="font-satoshi text-black font-bold ml-1 relative text-3xl mt-5 lg:text-4xl lg:mt-6">®</sup>
                    </div>
                    <span
                    class="text-display-1 font-black bg-gradient-ridged pr-2 -mr-2 bg-clip-text text-transparent leading-[1.3]">
                    Charger
                    </span>
                </div>
              </div>

                <!-- Hero CTA -->
              <div class="flex flex-row items-center gap-4">
              <p class="font-medium text-grey text-l md:text-xl lg:text-xl font-satoshi">
                  ab <span class="font-black text-black text-3xl md:text-4xl lg:text-4xl tracking-[-2px]">699€</span>
              </p>
              <button
                  type="button"
                  class="btn-primary">
                  Konfigurieren
              </button>
              </div>
          </div>

        <!-- Hero Picture / Video -->
        <div class="relative w-full max-w-md md:max-w-5xl lg:max-w-5xl mt-8 overflow-hidden h-112.5 md:h-137.5 lg:h-137.5">
            <picture>
                <source media="(min-width: 768px)" srcset="./assets/images/warp-charger-stand.png">
                <img
                    src="./assets/images/warp-charger-mobile.png"
                    alt="WARP Charger Stand"
                    class="w-full h-auto"
                >
            </picture>
            <div class="absolute inset-x-0 bottom-0 h-48 bg-gradient-light-white-image"></div>
        </div>
        </section>

        <section class="h-100"></section>
    </main>
  </body>
</html>
